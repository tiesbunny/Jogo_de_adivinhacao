<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-widith, inicial-scale=1.0">
        <title> Jogo de adivinhação </title>
    
        <style>
            .CorpoDaPagina{
                font-family: Arial, sans-serif;
                background-color: rgb(255, 207, 235);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            h1{
                color: rgb(214, 140, 180);
            }


            p{
                color: rgb(65, 59, 62);
            }

            .container{
                text-align: center;
                background-color: rgb(233, 190, 217);
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px rgba(#c29db7, #c29db7, #c29db7, 0.1);
            }

            input["number"]{
                padding: 10 px;
                font-size: 16px;
                width: 50 px;
                margin-bottom: 10px
            }

            button{
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
                background-color: rgb(254, 235, 255);
                color: #cf99b5;
                border: none;
                border-radius: 5px;
            }
            

        

        </style>
    
    </head>


    <body class="CorpoDaPagina">

        <div class="container">

            <h1> &#128174; Jogo de adivinhação &#128174 </h1>
            <p> Tente adivinhar o número secreto entre 1 e 100</p>

            <input type="number" id="TXTPalpite" min="1" max="100"/>
            <button id="BTNAdivimhar">Adivinhar</button>
        </div>
    </body>



    </html>
